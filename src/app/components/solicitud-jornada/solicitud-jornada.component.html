<section class="jornada-page">
  <div class="page-shell">
    <div class="form-card animate__animated animate__fadeInUp">
      <div class="form-header">
        <i class="fas fa-calendar-check" style="color: #003366; font-size: 2.5rem;"></i>
        <h2>Solicitud de Jornada</h2>
        <p>Uniremington al Parque - Proyección Social</p>
      </div>

      <form (ngSubmit)="onSubmit($event)" #jornadaForm="ngForm">
        <div class="compact-grid">

          <div class="form-group">
            <label>Nombre de la Entidad / Alcaldía</label>
            <input type="text" [(ngModel)]="formData.entidad" name="entidad" placeholder="Ej: Municipio de Támesis" required>
          </div>

          <div class="form-group">
            <label>Responsable</label>
            <input type="text" [(ngModel)]="formData.responsable" name="responsable" placeholder="Nombre completo" required>
          </div>

          <div class="form-group">
            <label>WhatsApp / Celular</label>
            <input type="tel" [(ngModel)]="formData.whatsapp" name="whatsapp" placeholder="300 000 0000" required>
          </div>

          <div class="form-group">
            <label>Correo Institucional</label>
            <input type="email" [(ngModel)]="formData.email" name="email" placeholder="correo@municipio.gov.co" required>
          </div>

          <div class="form-group">
            <label>Lugar propuesto</label>
            <select [(ngModel)]="formData.lugar" name="lugar" required>
              <option value="Parque Principal">Parque Principal</option>
              <option value="Centro de Integración Ciudadana (CIC)">Centro de Integración Ciudadana (CIC)</option>
              <option value="Institución Educativa">Institución Educativa</option>
              <option value="Coliseo Municipal">Coliseo Municipal</option>
            </select>
          </div>

          <div class="form-group">
            <label>Población estimada</label>
            <input type="number" [(ngModel)]="formData.poblacion" name="poblacion" placeholder="Ej: 200">
          </div>

          <div class="form-group full-width">
            <label>Servicios requeridos de nuestras Facultades:</label>
            <div class="services-selection">
              <label class="chip"><input type="checkbox" (change)="toggleServicio('Veterinaria', $event)"> Veterinaria (Mascotas)</label>
              <label class="chip"><input type="checkbox" (change)="toggleServicio('Jurídico', $event)"> Consultorio Jurídico</label>
              <label class="chip"><input type="checkbox" (change)="toggleServicio('Contable', $event)"> Consultorio Contable</label>
              <label class="chip"><input type="checkbox" (change)="toggleServicio('Salud', $event)"> Salud (P y P)</label>
              <label class="chip"><input type="checkbox" (change)="toggleServicio('Imagen', $event)"> Imagen Corporativa</label>
              <label class="chip"><input type="checkbox" (change)="toggleServicio('Ambiente', $event)"> Medio Ambiente</label>
            </div>
          </div>

          <div class="form-group full-width">
            <label>Información adicional o Requerimientos técnicos</label>
            <textarea [(ngModel)]="formData.infoAdicional" name="infoAdicional" rows="2" placeholder="¿Cuentan con carpas, sonido o puntos eléctricos?"></textarea>
          </div>
        </div>

        <button type="submit" class="btn-submit" [disabled]="isEnviando">
          {{ isEnviando ? 'Enviando...' : 'ENVIAR SOLICITUD' }}
          <i class="fas fa-paper-plane"></i>
        </button>

        <a (click)="goBack()" class="back-link">
          <i class="fas fa-arrow-left"></i> Volver al inicio
        </a>
      </form>
    </div>
  </div>
</section>
