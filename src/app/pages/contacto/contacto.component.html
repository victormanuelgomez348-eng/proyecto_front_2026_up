<section class="contact-page">
  <div class="container">
    <div class="contact-header">
      <span class="badge">Atención Global</span>
      <h1>Ponte en contacto <span>con nosotros</span></h1>
    </div>

    <div class="contact-wrapper">
      <div class="contact-info">
        <div class="info-card" *ngFor="let item of infoCards">
          <div class="icon-box"><i [class]="item.icon"></i></div>
          <div class="text">
            <h3>{{ item.title }}</h3>
            <p>{{ item.desc }}</p>
          </div>
        </div>
      </div>

      <div class="contact-form-container">
        <div *ngIf="mensajeExito" class="success-message">
          <i class="fa-solid fa-check-circle"></i> {{ mensajeExito }}
        </div>

        <form class="modern-form" (ngSubmit)="enviarMensaje()">
          <div class="form-row">
            <div class="form-group">
              <label>Tipo de Documento</label>
              <select [(ngModel)]="formData.tipoDocumento" name="tipoDoc" required>
                <option value="CC">Cédula de Ciudadanía</option>
                <option value="CE">Cédula de Extranjería</option>
                <option value="TI">Tarjeta de Identidad</option>
              </select>
            </div>
            <div class="form-group">
              <label>Número de Documento</label>
              <input type="text" [(ngModel)]="formData.numeroIdentidad" name="documento" placeholder="Ej: 100xxxxxxx" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Nombre Completo</label>
              <input type="text" [(ngModel)]="formData.nombre" name="nombre" placeholder="Ej: Juan Pérez" required>
            </div>
            <div class="form-group">
              <label>Celular</label>
              <input type="tel" [(ngModel)]="formData.celular" name="celular" placeholder="300 000 0000" required>
            </div>
          </div>

          <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" [(ngModel)]="formData.email" name="email" placeholder="usuario@correo.com" required>
          </div>

          <div class="form-group">
            <label>Asunto</label>
            <select [(ngModel)]="formData.asunto" name="asunto" required>
              <option>Solicitar Jornada</option>
              <option>Información de Servicios</option>
              <option>Dudas de Estudiantes</option>
              <option>Otro</option>
            </select>
          </div>

          <div class="form-group">
            <label>Mensaje</label>
            <textarea [(ngModel)]="formData.mensaje" name="mensaje" rows="4" placeholder="¿En qué podemos ayudarte?"></textarea>
          </div>

          <button type="submit" class="btn-submit">
            Enviar Mensaje <i class="fa-solid fa-paper-plane"></i>
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
