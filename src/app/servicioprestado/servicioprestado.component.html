<div class="services-page">
  <header class="services-hero">
    <span class="eyebrow">Gestión Institucional</span>
    <h1>Servicios Prestados</h1>
    <p>Registra la labor institucional con impacto social en el territorio.</p>
  </header>

  <div class="form-card">
    <form [formGroup]="form" class="form-grid">

      <label>
        Facultad
        <select formControlName="facultad">
          <option value="" disabled selected>Seleccione...</option>
          <option>Ingeniería</option>
          <option>Ciencias Administrativas</option>
          </select>
      </label>

      <label>Servicio
        <input formControlName="servicio" placeholder="Nombre del servicio">
      </label>

      <label>Beneficiario
        <input formControlName="beneficiario" placeholder="Nombre completo">
      </label>

      <label>Documento
        <input formControlName="documento" placeholder="Número de identidad">
      </label>

      <label>Departamento
        <input formControlName="departamento" placeholder="Ej: Antioquia">
      </label>

      <label>Municipio
        <input formControlName="municipio" placeholder="Ej: Medellín">
      </label>

      <label>Vereda
        <input formControlName="vereda" placeholder="Ej: La Loma">
      </label>

      <label>Barrio
        <input formControlName="barrio" placeholder="Ej: Poblado">
      </label>

      <label>Contacto
        <input formControlName="contacto" placeholder="Teléfono o email">
      </label>

      <label>Fecha
        <input type="date" formControlName="fecha">
      </label>

      <div class="form-actions">
        <button type="submit">Guardar Registro</button>
      </div>

    </form>
  </div>
</div>
