<div class="container">
  <h2>Gestión de Servicios Prestados</h2>

  <form [formGroup]="form" (ngSubmit)="guardar()">
    <div class="form-group">
      <input formControlName="servicio" placeholder="Servicio" />
      <input formControlName="beneficiario" placeholder="Beneficiario" />
      <input formControlName="documento" placeholder="Documento" />
      <input formControlName="municipio" placeholder="Municipio" />
      <input type="date" formControlName="fecha" />
    </div>

    <button type="submit" [disabled]="form.invalid">
      {{ editandoId ? 'Actualizar' : 'Guardar' }}
    </button>

    <button type="button" (click)="form.reset(); editandoId = null;">Cancelar</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>Servicio</th>
        <th>Beneficiario</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let reg of registros">
        <td>{{ reg.servicio }}</td>
        <td>{{ reg.beneficiario }}</td>
        <td>
          <button (click)="editar(reg)">Editar</button>
          <button (click)="eliminar(reg.id)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
