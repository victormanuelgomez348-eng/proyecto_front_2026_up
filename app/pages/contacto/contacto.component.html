<section class="contact-page">
  <div class="container">

    <div class="contact-header">
      <span class="badge">Atención Global</span>
      <h1>Ponte en contacto <span>con nosotros</span></h1>
      <p>Nuestro equipo de Proyección Social está listo para asesorarte en cada una de nuestras sedes.</p>
    </div>

    <div class="contact-wrapper">
      <!-- Tarjetas de Información -->
      <div class="contact-info">
        <div class="info-card">
          <div class="icon-box">
            <i class="fa-solid fa-location-dot"></i>
          </div>
          <div class="text">
            <h3>Sede Principal</h3>
            <p>Medellín, Calle 57 No. 41-19</p>
          </div>
        </div>

        <div class="info-card">
          <div class="icon-box">
            <i class="fa-solid fa-phone-volume"></i>
          </div>
          <div class="text">
            <h3>Línea Única</h3>
            <p>(604) 322 10 00 Ext. 2000</p>
          </div>
        </div>

        <div class="info-card">
          <div class="icon-box">
            <i class="fa-solid fa-envelope-open-text"></i>
          </div>
          <div class="text">
            <h3>Correo Institucional</h3>
            <p>social&#64;uniremington.edu.co</p>
          </div>
        </div>

        <div class="social-reach">
          <h4>Nuestras Redes</h4>
          <div class="social-icons">
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
          </div>
        </div>
      </div>

      <!-- Formulario Moderno -->
      <div class="contact-form-container">
        <form class="modern-form">
          <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" placeholder="Ej: Juan Pérez">
          </div>

          <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" placeholder="usuario&#64;correo.com">
          </div>

          <div class="form-group">
            <label>Asunto</label>
            <select>
              <option>Solicitar Jornada</option>
              <option>Información de Servicios</option>
              <option>Dudas de Estudiantes</option>
              <option>Otro</option>
            </select>
          </div>

          <div class="form-group">
            <label>Mensaje</label>
            <textarea rows="4" placeholder="¿En qué podemos ayudarte?"></textarea>
          </div>

          <button type="submit" class="btn-submit">
            Enviar Mensaje <i class="fa-solid fa-paper-plane"></i>
          </button>
        </form>
      </div>
    </div>

  </div>
</section>
