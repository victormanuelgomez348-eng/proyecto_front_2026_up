<div class="auth-container">
  <div class="auth-card" style="max-width: 600px; justify-content: center;">
    <div class="auth-form-section" style="flex: 1; align-items: center;">

      <!-- Icono de Remi -->
      <div class="remi-bot-circle">
        <i class="fa-solid fa-robot"></i>
      </div>

      <div class="remi-bubble">
        <p>¡Hola! Soy Remi. ¿En qué puedo ayudarte con tu cuenta de Uniremington?</p>
      </div>

      <form style="width: 100%;">
        <div class="form-group-custom">
          <label>Correo Institucional</label>
          <input type="email" placeholder="usuario@uniremington.edu.co">
        </div>

        <div class="form-group-custom">
          <label>Tipo de Problema</label>
          <select>
            <option>No recibo el correo de contraseña</option>
            <option>Usuario bloqueado</option>
            <option>Otro problema</option>
          </select>
        </div>

        <div class="form-group-custom">
          <label>Descripción</label>
          <textarea rows="4" placeholder="Cuéntame brevemente qué sucede..."></textarea>
        </div>

        <button type="submit" class="btn-primary-auth">Enviar a Remi</button>
      </form>

      <a routerLink="/login" class="back-link-bottom">← Volver atrás</a>
    </div>
  </div>
</div>
